repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^homm3tools/
      - id: end-of-file-fixer
        exclude: ^homm3tools/

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v21.1.7
    hooks:
      - id: clang-format
        files: \.(c|cpp|h|hpp)$
        exclude: ^homm3tools/
